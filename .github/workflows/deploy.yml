name: Deploy Backend to Elastic Beanstalk

on:
  push:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint --if-present

  deploy:
    name: Deploy to EB
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create deployment zip (EB runs npm install — no node_modules needed)
        run: |
          zip -r deploy.zip . \
            --exclude "*.git*" \
            --exclude "node_modules/*" \
            --exclude ".env" \
            --exclude "*.log" \
            --exclude ".elasticbeanstalk/logs/*"

      - name: Deploy to Elastic Beanstalk
        uses: einaregilsson/beanstalk-deploy@v22
        with:
          aws_access_key:   ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_key:   ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          application_name: soltech-trade-backend
          environment_name: soltech-trade-backend-env
          region: us-east-1
          version_label:    "deploy-${{ github.sha }}"
          deployment_package: deploy.zip
          wait_for_environment_recovery: 120

      - name: Health check
        run: |
          sleep 20
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ secrets.BACKEND_URL }}/health")
          echo "Health check returned: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Health check failed!"
            exit 1
          fi
